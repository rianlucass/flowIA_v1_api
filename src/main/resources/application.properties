spring.application.name=${SPRING_APPLICATION_NAME:flowia-api}

# Load local .env file if present (development convenience)
spring.config.import=optional:file:.env[.properties]

# Server
server.port=${SERVER_PORT:8080}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Datasource (Supabase/Postgres)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.jdbc.time_zone=${JPA_TIMEZONE:UTC}

# JWT
api.security.token.secret=${JWT_SECRET:flowia-secret-key-change-in-production}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hikari pool
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}

# OCR Service
ocr.service.url=${OCR_SERVICE_URL:http://localhost:5000}

# N8N Webhook
n8n.webhook.url=${N8N_WEBHOOK_URL:http://localhost:5678/webhook/apply}

# Service API Key (used by internal services like N8N to call POST /analysis)
service.api-key=${SERVICE_API_KEY:change-this-in-production}

# File Storage
uploads.base-dir=${UPLOADS_BASE_DIR:uploads}

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:25MB}

spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}

# Optional SQL initialization
spring.sql.init.mode=${SQL_INIT_MODE:never}

